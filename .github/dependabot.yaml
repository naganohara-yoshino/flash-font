version: 2
updates:
  - package-ecosystem: "cargo"

    directory: "/"

    schedule:
      interval: "weekly"

    open-pull-requests-limit: 10

    commit-message:
      prefix: "chore(deps):"

    labels: [dependencies, internal]

    target-branch: "dev"

  - package-ecosystem: "github-actions"

    directory: "/"

    schedule:
      interval: "weekly"

    open-pull-requests-limit: 10

    commit-message:
      prefix: "chore(deps):"

    labels: [dependencies, internal]

    target-branch: "dev"
